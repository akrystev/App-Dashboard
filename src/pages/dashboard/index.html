<div class="container-fluid mt-5 mb-5 px-3 px-md-4">
    <!-- Header Section -->
    <div class="dashboard-header">
        <div class="dashboard-title">
            <h1 class="mb-2">
                <i class="bi bi-speedometer2 me-2"></i>Welcome, <span id="userGreeting"></span>! 👋
            </h1>
            <p class="text-muted">Manage and organize your favorite applications and quick links</p>
        </div>
        <div>
            <button class="btn btn-primary btn-lg" id="addShortcutBtn">
                <i class="bi bi-plus-circle me-2"></i> Create Shortcut
            </button>
        </div>
    </div>

    <!-- Alert Messages -->
    <div id="errorAlert" class="alert alert-danger d-none" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span id="errorMessage"></span>
    </div>
    <div id="successAlert" class="alert alert-success d-none" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span id="successMessage"></span>
    </div>

    <!-- Shortcuts Grid -->
    <div id="shortcutsContainer"></div>
</div>

<!-- Add/Edit Shortcut Modal -->
<div class="modal fade" id="shortcutModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">
                    <i class="bi bi-plus-circle me-2"></i>Add New Shortcut
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="shortcutForm">
                    <div class="mb-3">
                        <label for="shortcutName" class="form-label">
                            <i class="bi bi-tag me-2"></i>Name
                        </label>
                        <input type="text" class="form-control" id="shortcutName" placeholder="e.g., Gmail, Netflix"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="shortcutUrl" class="form-label">
                            <i class="bi bi-link-45deg me-2"></i>URL or Local Address
                        </label>
                        <input type="text" class="form-control" id="shortcutUrl"
                            placeholder="https://example.com or http://192.168.1.100:8080" required>
                        <div class="form-text">
                            <i class="bi bi-info-circle me-1"></i>Don't forget to add "http://" or "https://"
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="shortcutIcon" class="form-label">
                            <i class="bi bi-star me-2"></i>Icon (Bootstrap Icon Class)
                        </label>
                        <input type="text" class="form-control" id="shortcutIcon" placeholder="bi-plus-circle"
                            value="bi-link-45deg">
                        <div class="form-text">
                            Find icons at: <a href="https://icons.getbootstrap.com/"
                                target="_blank">icons.getbootstrap.com</a>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="shortcutIconFile" class="form-label">
                            <i class="bi bi-image me-2"></i>Personal Icon (optional)
                        </label>
                        <input type="file" class="form-control" id="shortcutIconFile" accept="image/*">
                        <div class="form-text">
                            Upload PNG/JPG/SVG/WebP up to 2MB. If selected, this image overrides the icon class.
                        </div>
                        <div class="mt-2 d-none" id="shortcutIconPreviewWrapper">
                            <img id="shortcutIconPreview" alt="Icon preview" class="shortcut-icon-preview">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="shortcutDescription" class="form-label">
                            <i class="bi bi-chat me-2"></i>Description
                        </label>
                        <textarea class="form-control" id="shortcutDescription" rows="2"
                            placeholder="Optional description..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="bi bi-x me-2"></i>Cancel
                </button>
                <button type="button" class="btn btn-success" id="saveShortcutBtn">
                    <i class="bi bi-check-circle me-2"></i>Save Shortcut
                </button>
            </div>
        </div>
    </div>
</div>
