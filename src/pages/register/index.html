    <div class="container-fluid">
        <a class="navbar-brand" href="#/">
            <i class="bi bi-speedometer2"></i> App Dashboard
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#/login">
                        <i class="bi bi-box-arrow-in-right"></i> Login

<div class="container-fluid mt-5 px-3">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <div
                            style="width: 60px; height: 60px; margin: 0 auto 1rem; background: var(--gradient-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.8rem;">
                            <i class="bi bi-person-plus"></i>
                        </div>
                        <h2 class="card-title mb-2">Create Your Account</h2>
                        <p class="text-muted">Join us and organize your shortcuts</p>
                    </div>

                    <div id="errorAlert" class="alert alert-danger d-none" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span id="errorMessage"></span>
                    </div>
                    <div id="successAlert" class="alert alert-success d-none" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        <span id="successMessage"></span>
                    </div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                <i class="bi bi-envelope me-2"></i>Email address
                            </label>
                            <input type="email" class="form-control" id="email" name="email"
                                placeholder="you@example.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">
                                <i class="bi bi-lock me-2"></i>Password
                            </label>
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="Create a secure password" required>
                            <div class="form-text">
                                <i class="bi bi-info-circle me-1"></i>At least 8 characters recommended
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">
                                <i class="bi bi-shield-lock me-2"></i>Confirm password
                            </label>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                                placeholder="Re-enter your password" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100 mb-3" id="registerBtn">
                            <i class="bi bi-check-circle me-2"></i>
                            <span id="btnText">Create Account</span>
                            <span id="spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"
                                aria-hidden="true"></span>
                        </button>
                    </form>

                    <div class="mt-4 text-center">
                        <p class="text-muted mb-0">Already have an account? <a href="#/login"
                                class="text-decoration-none fw-600">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
